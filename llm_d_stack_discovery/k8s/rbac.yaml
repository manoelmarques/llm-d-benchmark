apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-d-stack-discovery
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: llm-d-stack-discovery
rules:
  # Core resources
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list"]

  # OpenShift resources
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list"]
  - apiGroups: ["security.openshift.io"]
    resources: ["securitycontextconstraints"]
    verbs: ["get", "list"]
  - apiGroups: ["config.openshift.io"]
    resources: ["clusterversions"]
    verbs: ["get"]

  # Gateway API resources
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gateways", "httproutes", "gatewayclasses"]
    verbs: ["get", "list"]

  # GAIE resources
  - apiGroups: ["inference.networking.x-k8s.io"]
    resources: ["inferencepools", "inferencemodels"]
    verbs: ["get", "list"]

  # Version info
  - apiGroups: [""]
    resources: ["version"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: llm-d-stack-discovery
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: llm-d-stack-discovery
subjects:
  - kind: ServiceAccount
    name: llm-d-stack-discovery
    namespace: default