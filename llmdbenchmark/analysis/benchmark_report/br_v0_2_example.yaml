        UCX_NET_DEVICES: mlx5_1:1
        NCCL_IB_HCA: mlx5_1
        VLLM_NIXL_SIDE_CHANNEL_PORT: "5557"
        VLLM_NIXL_SIDE_CHANNEL_HOST: 10.39.39.3
        VLLM_LOGGING_LEVEL: DEBUG
        VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"

  - metadata:
