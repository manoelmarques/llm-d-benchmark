name: Markdown Link Checker
description: Checks all Markdown files for broken links
inputs:
  github-token:
    description: GitHub token (not used, but kept for interface compatibility)
    required: false
  args:
    description: Arguments to pass to markdown-link-check
    required: false
    default: "--retry --verbose"

runs:
  using: "composite"
  steps:
    - name: Install markdown-link-check
      shell: bash
      run: npm install -g markdown-link-check

    - name: Run link check on all Markdown files
      shell: bash
      run: |
        set -euo pipefail
        echo "Scanning all Markdown files for broken links..."
        failed=0
        total_dead_links=0
        failed_files=""

        CONFIG_ARG=""
        if [ -f ".markdown-link-check.json" ]; then
          CONFIG_ARG="--config .markdown-link-check.json"
          echo "Using config: .markdown-link-check.json"
        fi

        while IFS= read -r -d '' file; do
          echo "------------------------------------------------------------"
          echo "Checking: $file"
          output=$(markdown-link-check ${{ inputs.args }} $CONFIG_ARG "$file" 2>&1) || true
          echo "$output"

          if echo "$output" | grep -q '[✖]'; then
            num_file_dead_links=$(echo "$output" | grep '[✖]' | wc -l)
            echo ""
            echo "FAILED: $file ($num_file_dead_links broken links)"
            echo "Broken links:"
            echo "$output" | grep '[✖]' | while read -r line; do
              echo "  $line"
            done
            echo ""
            total_dead_links=$((total_dead_links + num_file_dead_links))
            failed_files="${failed_files}\n  - ${file} (${num_file_dead_links} broken)"
            failed=1
          fi
        done < <(find . -type f -name "*.md" -not -name "*-template.md" -not -path "./.git/*" -not -path "./node_modules/*" -print0)

        echo "============================================================"
        if [ "$failed" -ne 0 ]; then
          echo "LINK CHECK FAILED"
          echo "Total broken links: $total_dead_links"
          echo ""
          echo "Files with broken links:"
          echo -e "$failed_files"
          echo ""
          echo "To fix:"
          echo "  1. Update broken relative paths to point to existing files"
          echo "  2. Remove links to deleted/moved files"
          echo "  3. Add flaky external URLs to .markdown-link-check.json ignorePatterns"
          exit 1
        else
          echo "All Markdown files passed link checks."
        fi
