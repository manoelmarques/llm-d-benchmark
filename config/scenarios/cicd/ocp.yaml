# OpenShift Container Platform CI/CD Scenario
# Based on scenarios/cicd/ocp_fb.sh
#
# CI/CD scenario for OpenShift clusters.
# Uses facebook/opt-125m for fast validation with Istio gateway.
# GPU affinity is auto-detected (commented out in original).

scenario:
  - name: "ocp-cicd"

    # Model
    # Corresponds to: LLMDBENCH_DEPLOY_MODEL_LIST="facebook/opt-125m"
    model:
      name: facebook/opt-125m
      shortName: facebook-opt-125m
      path: models/facebook/opt-125m
      huggingfaceId: facebook/opt-125m

    # Namespace -- dedicated CI/CD namespace
    # Corresponds to: LLMDBENCH_VLLM_COMMON_NAMESPACE=llmdbenchcicd
    namespace:
      name: llmdbenchcicd

    # Harness namespace -- same as deploy namespace for CI/CD
    # Corresponds to: LLMDBENCH_HARNESS_NAMESPACE=llmdbenchcicd
    harnessNamespace:
      name: llmdbenchcicd

    # Deployment method
    modelservice:
      enabled: true
    standalone:
      enabled: false

    # Helm release name
    # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_RELEASE=llmdbenchcicd
    release: llmdbenchcicd

    # GPU affinity -- auto-detected on OpenShift
    # Corresponds to: LLMDBENCH_VLLM_COMMON_AFFINITY (not set in original -- auto-detect)
    # Uncomment to select specific GPU:
    # affinity:
    #   enabled: true
    #   nodeSelector:
    #     nvidia.com/gpu.product: NVIDIA-L40S

    # Accelerator configuration
    # Corresponds to: LLMDBENCH_VLLM_COMMON_ACCELERATOR_MEMORY=48
    accelerator:
      memory: 48

    # Corresponds to: LLMDBENCH_VLLM_COMMON_REPLICAS=1
    decode:
      replicas: 1

    # Gateway configuration -- Istio for OpenShift
    # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_GATEWAY_CLASS_NAME=istio
    gateway:
      className: istio

    # Storage
    # Corresponds to: LLMDBENCH_VLLM_COMMON_PVC_STORAGE_CLASS=ocs-storagecluster-cephfs
    storage:
      modelPvc:
        storageClassName: ocs-storagecluster-cephfs

    # Corresponds to: LLMDBENCH_CONTROL_WORK_DIR=/tmp/cicd/
    workDir: /tmp/cicd/

    # Corresponds to: LLMDBENCH_HARNESS_NAME=vllm-benchmark
    harness:
      name: vllm-benchmark
      experimentProfile: sanity_random.yaml
