# Kind Simulated Accelerators CI/CD Scenario
# Migrated from bash environment variables to YAML format
# Based on scenarios/cicd/kind_sim_fb.sh
#
# CI/CD scenario for Kind clusters using llm-d-inference-sim.
# No GPU required -- runs inference simulation on CPU-only nodes.
# Uses facebook/opt-125m with minimal resource requirements.

scenario:
  - name: "kind-sim-cicd"

    # Model
    model:
      name: facebook/opt-125m
      shortName: facebook-opt-125m
      path: models/facebook/opt-125m
      huggingfaceId: facebook/opt-125m
      maxModelLen: 1024
      gpuMemoryUtilization: 0

    # CPU-only affinity
    affinity:
      enabled: true
      nodeSelector:
        kubernetes.io/os: linux

    # No GPU accelerators
    accelerator:
      count: 0
      memory: 24  # To pass capacity planner sanity checking

    # Minimal resources for Kind cluster
    vllmCommon:
      shmMemory: 500Mi

    # Storage -- minimal for Kind
    storage:
      modelPvc:
        accessMode: ReadWriteOnce
        size: 2Gi
      harnessPvc:
        size: 3Gi

    # Override images for simulation
    images:
      vllm:
        repository: ghcr.io/llm-d/llm-d-inference-sim
        tag: latest

    # Standalone deployment config (disabled -- deploy method is modelservice)
    # Standalone config is kept as fallback for standalone testing
    standalone:
      enabled: false
      replicas: 1

      image:
        repository: ghcr.io/llm-d/llm-d-inference-sim
        tag: latest
        pullPolicy: Always

      resources:
        limits:
          memory: 100Mi
          cpu: "0"
        requests:
          memory: 100Mi
          cpu: "0"

      vllm:
        customCommand: "/app/llm-d-inference-sim --model /model-cache/models/facebook/opt-125m --port 8000 --served-model-name facebook/opt-125m"

    # Decode configuration -- use image's default entrypoint (inference-sim)
    decode:
      replicas: 1

      parallelism:
        tensor: 0
        data: 1
        dataLocal: 1
        workers: 1

      resources:
        limits:
          memory: 100Mi
          cpu: "0"
        requests:
          memory: 100Mi
          cpu: "0"

      accelerator:
        count: 0

      vllm:
        modelCommand: imageDefault

    # Prefill configuration -- use image's default entrypoint (inference-sim)
    prefill:
      enabled: true
      replicas: 1

      parallelism:
        tensor: 0
        data: 1
        dataLocal: 1
        workers: 1

      resources:
        limits:
          memory: 100Mi
          cpu: "0"
        requests:
          memory: 100Mi
          cpu: "0"

      accelerator:
        count: 0

      vllm:
        modelCommand: imageDefault

    # Modelservice configuration
    modelservice:
      enabled: true
      uriProtocol: hf

    # Short timeout for Kind clusters
    control:
      waitTimeout: 20

    # Workload -- uses default harness
    harness:
      name: inference-perf
      experimentProfile: sanity_random.yaml
