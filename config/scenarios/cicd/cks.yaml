# CKS (Cloud Kubernetes Service) CI/CD Scenario
# Based on scenarios/cicd/cks_fb.sh
#
# CI/CD scenario for CKS clusters with H200 GPUs.
# Uses facebook/opt-125m for fast validation.

scenario:
  - name: "cks-cicd"

    # Model
    # Corresponds to: LLMDBENCH_DEPLOY_MODEL_LIST="facebook/opt-125m"
    model:
      name: facebook/opt-125m
      shortName: facebook-opt-125m
      path: models/facebook/opt-125m
      huggingfaceId: facebook/opt-125m

    # Namespace -- dedicated CI/CD namespace
    # Corresponds to: LLMDBENCH_VLLM_COMMON_NAMESPACE=llmdbenchcicd
    namespace:
      name: llmdbenchcicd

    # Harness namespace -- same as deploy namespace for CI/CD
    # Corresponds to: LLMDBENCH_HARNESS_NAMESPACE=llmdbenchcicd
    harnessNamespace:
      name: llmdbenchcicd

    # Deployment method
    modelservice:
      enabled: true
    standalone:
      enabled: false

    # Helm release name
    # Corresponds to: LLMDBENCH_VLLM_MODELSERVICE_RELEASE=llmdbenchcicd
    release: llmdbenchcicd

    # GPU affinity for H200
    # Corresponds to: LLMDBENCH_VLLM_COMMON_AFFINITY=gpu.nvidia.com/class:H200
    affinity:
      enabled: true
      nodeSelector:
        gpu.nvidia.com/class: H200

    # Accelerator configuration
    # Corresponds to: LLMDBENCH_VLLM_COMMON_ACCELERATOR_MEMORY=143
    accelerator:
      memory: 143

    # Corresponds to: LLMDBENCH_VLLM_COMMON_REPLICAS=1
    decode:
      replicas: 1

    # Storage
    # Corresponds to: LLMDBENCH_VLLM_COMMON_PVC_STORAGE_CLASS=shared-vast
    storage:
      modelPvc:
        storageClassName: shared-vast

    # Corresponds to: LLMDBENCH_CONTROL_WORK_DIR=/tmp/cicd/
    workDir: /tmp/cicd/

    # Corresponds to: LLMDBENCH_HARNESS_NAME=vllm-benchmark
    harness:
      name: vllm-benchmark
      experimentProfile: sanity_random.yaml
