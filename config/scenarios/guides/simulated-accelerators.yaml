# LLM-D Simulated Accelerators Scenario
# Based on https://github.com/llm-d/llm-d/blob/dev/guides/simulated-accelerators/README.md
#
# Uses llm-d-inference-sim image to simulate inference without real GPUs.
# Deploys a "random" model with 0 GPU accelerators on CPU-only nodes.
#
# Key changes from upstream guide:
#   - Uses hf://random as model URI (modelservice chart handles this)
#   - Decode: 3 replicas with uds-tokenizer init container
#   - Prefill: 1 replica with uds-tokenizer init container
#   - Routing proxy enabled with nixlv2 connector
#   - Pod monitoring enabled for both decode and prefill

scenario:
  - name: simulated-accelerators

    # =========================================================================
    # COMMON -- Applies to all deployment methods
    # =========================================================================

    # -------------------------------------------------------------------------
    # Model Configuration
    # Uses "random" as a lightweight simulated model
    # -------------------------------------------------------------------------
    model:
      name: random
      shortName: random
      path: models/random
      huggingfaceId: random
      gpuMemoryUtilization: 0
      size: 5Mi

    # -------------------------------------------------------------------------
    # Model Artifacts
    # The upstream guide uses hf://random with custom labels
    # -------------------------------------------------------------------------
    modelArtifacts:
      extraLabels:
        llm-d.ai/guide: "simulated-accelerators"
        llm-d.ai/accelerator-variant: "cpu"

    storage:
      modelPvc:
        size: 5Mi

    # -------------------------------------------------------------------------
    # Affinity / Node Selection
    # CPU-only nodes (no GPU required)
    # -------------------------------------------------------------------------
    affinity:
      enabled: true
      nodeSelector:
        kubernetes.io/os: linux

    # -------------------------------------------------------------------------
    # Accelerator Configuration -- no GPUs
    # -------------------------------------------------------------------------
    accelerator:
      count: 0

    # =========================================================================
    # DEPLOYMENT METHOD
    # =========================================================================
    gateway:
      className: agentgateway

    # Use hf:// URI protocol so the modelservice chart handles model loading
    # directly (no PVC download job needed)
    modelservice:
      enabled: true
      uriProtocol: hf

    standalone:
      enabled: false

    # =========================================================================
    # MULTINODE -- disabled
    # =========================================================================
    multinode:
      enabled: false

    # =========================================================================
    # ROUTING / PROXY CONFIGURATION
    # Routing proxy enabled with nixlv2 connector (matches upstream guide)
    # =========================================================================
    routing:
      servicePort: 8000
      connector: nixlv2
      secure: false
      proxy:
        enabled: true
        image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.7.1
        connector: nixlv2
        secure: false

    # =========================================================================
    # MODELSERVICE CONFIGURATION
    # =========================================================================

    # Override images for simulation
    images:
      vllm:
        repository: ghcr.io/llm-d/llm-d-inference-sim
        tag: v0.8.2
        pullPolicy: IfNotPresent
      routingSidecar:
        repository: ghcr.io/llm-d/llm-d-routing-sidecar
        tag: v0.7.1

    # -------------------------------------------------------------------------
    # Decode Configuration -- 3 replicas with uds-tokenizer
    # -------------------------------------------------------------------------
    decode:
      enabled: true
      replicas: 3

      # Monitoring
      monitoring:
        podmonitor:
          enabled: true
          portName: "vllm"
          path: "/metrics"
          interval: "30s"

      initContainers:
        - name: uds-tokenizer
          image: ghcr.io/llm-d/llm-d-uds-tokenizer:v0.7.1
          imagePullPolicy: IfNotPresent
          restartPolicy: Always
          env:
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: PROBE_PORT
              value: "8082"
          ports:
            - name: health
              containerPort: 8082
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: uds-socket
              mountPath: /tmp/tokenizer

      parallelism:
        tensor: 0
        data: 1
        dataLocal: 1
        workers: 1

      vllm:
        modelCommand: imageDefault
        port: 8200

      # Decode container ports (vllm port)
      ports:
        - containerPort: 8200
          name: vllm
          protocol: TCP

      # Extra container config for probes and volume mounts
      extraContainerConfig:
        imagePullPolicy: IfNotPresent

      # Additional volume mounts for decode container
      additionalVolumeMounts:
        - name: metrics-volume
          mountPath: /.config
        - name: uds-socket
          mountPath: /tmp/tokenizer

      # Additional volumes for decode pods
      additionalVolumes:
        - name: metrics-volume
          emptyDir: {}
        - name: uds-socket
          emptyDir: {}

      # Custom probes matching upstream guide
      probes:
        startup:
          path: /v1/models
          port: 8200
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 60
        liveness:
          path: /health
          port: 8200
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readiness:
          path: /v1/models
          port: 8200
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3

    # -------------------------------------------------------------------------
    # Prefill Configuration -- 1 replica with uds-tokenizer
    # -------------------------------------------------------------------------
    prefill:
      enabled: true
      replicas: 1

      # Monitoring
      monitoring:
        podmonitor:
          enabled: true
          portName: "vllm"
          path: "/metrics"
          interval: "30s"

      initContainers:
        - name: uds-tokenizer
          image: ghcr.io/llm-d/llm-d-uds-tokenizer:v0.7.1
          imagePullPolicy: IfNotPresent
          restartPolicy: Always
          env:
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: PROBE_PORT
              value: "8082"
          ports:
            - name: health
              containerPort: 8082
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: uds-socket
              mountPath: /tmp/tokenizer

      parallelism:
        tensor: 0
        data: 1
        dataLocal: 1
        workers: 1

      vllm:
        modelCommand: imageDefault
        port: 8000

      # Prefill container ports
      ports:
        - containerPort: 8000
          name: vllm
          protocol: TCP

      # Extra container config for probes and volume mounts
      extraContainerConfig:
        imagePullPolicy: IfNotPresent

      # Additional volume mounts for prefill container
      additionalVolumeMounts:
        - name: metrics-volume
          mountPath: /.config
        - name: uds-socket
          mountPath: /tmp/tokenizer

      # Additional volumes for prefill pods
      additionalVolumes:
        - name: metrics-volume
          emptyDir: {}
        - name: uds-socket
          emptyDir: {}

      # Custom probes matching upstream guide
      probes:
        startup:
          path: /v1/models
          port: 8000
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 60
        liveness:
          path: /health
          port: 8000
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readiness:
          path: /v1/models
          port: 8000
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3

    # =========================================================================
    # COMMON -- Applies to all deployment methods (continued)
    # =========================================================================

    # -------------------------------------------------------------------------
    # vLLM Common Configuration
    # -------------------------------------------------------------------------
    vllmCommon:
      shmMemory: 500Mi

      volumes:
        - name: dshm
          type: emptyDir
          emptyDir:
            medium: Memory
            sizeLimit: 500Mi

      volumeMounts:
        - name: dshm
          mountPath: /dev/shm

    # =========================================================================
    # WORKLOAD / HARNESS -- Benchmark execution configuration
    # =========================================================================

    workDir: "~/data/simulated-accelerators"

    harness:
      name: vllm-benchmark
      experimentProfile: random_concurrent.yaml
